apiVersion: v1
kind: Namespace
metadata:
  name: cafi-product
---
apiVersion: v1
kind: Secret
metadata:
  name: ngrok-secret
  namespace: cafi-product
type: Opaque
stringData:
  authtoken: "2wocRy0hrfn2r3cLIiABBDcyd8W_7M9xwJpsUA96rD2u8R9pe"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cafi-product-api
  namespace: cafi-product
  labels:
    app: cafi-product
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cafi-product
  template:
    metadata:
      labels:
        app: cafi-product
    spec:
      containers:
        - name: api
          image: image-registry.openshift-image-registry.svc:5000/cafi-product/cafi-product:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir -r config/requirements.txt && \
              python app.py
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: app-code
              mountPath: /app
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: app-code
          configMap:
            name: cafi-product-code
---
apiVersion: v1
kind: Service
metadata:
  name: cafi-product-service
  namespace: cafi-product
  labels:
    app: cafi-product
spec:
  selector:
    app: cafi-product
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngrok-tunnel
  namespace: cafi-product
  labels:
    app: ngrok
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ngrok
  template:
    metadata:
      labels:
        app: ngrok
    spec:
      containers:
        - name: ngrok
          image: image-registry.openshift-image-registry.svc:5000/cafi-product/ngrok:3
          imagePullPolicy: IfNotPresent
          workingDir: /tmp/ngrok
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /tmp/ngrok && \
              ngrok config add-authtoken "$NGROK_AUTHTOKEN" && \
              ngrok http cafi-product-service:8000 --log=stdout
          env:
            - name: NGROK_AUTHTOKEN
              valueFrom:
                secretKeyRef:
                  name: ngrok-secret
                  key: authtoken
          ports:
            - containerPort: 4040
              name: inspector
          volumeMounts:
            - name: ngrok-tmp
              mountPath: /tmp/ngrok
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: ngrok-tmp
          emptyDir: {}

