---
# OpenShift Deployment with Ngrok Sidecar Container
# This configuration runs both the API and ngrok in the same pod

apiVersion: v1
kind: ConfigMap
metadata:
  name: product-catalog-config
  namespace: cfai-project
data:
  # Application configuration
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  PORT: "8000"

---
apiVersion: v1
kind: Secret
metadata:
  name: ngrok-auth
  namespace: cfai-project
type: Opaque
stringData:
  # Replace with your actual ngrok authtoken from https://dashboard.ngrok.com
  NGROK_AUTHTOKEN: "YOUR_NGROK_AUTHTOKEN_HERE"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalog-api
  namespace: cfai-project
  labels:
    app: product-catalog-api
spec:
  replicas: 1  # Keep at 1 for ngrok free tier
  selector:
    matchLabels:
      app: product-catalog-api
  template:
    metadata:
      labels:
        app: product-catalog-api
    spec:
      containers:
      # Main API Container
      - name: api
        image: image-registry.openshift-image-registry.svc:5000/cfai-project/product-catalog-api:latest
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: product-catalog-config
              key: APP_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: product-catalog-config
              key: LOG_LEVEL
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: product-catalog-config
              key: PORT
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      # Ngrok Sidecar Container
      - name: ngrok
        image: ngrok/ngrok:latest
        ports:
        - containerPort: 4040
          name: ngrok-web
          protocol: TCP
        env:
        - name: NGROK_AUTHTOKEN
          valueFrom:
            secretKeyRef:
              name: ngrok-auth
              key: NGROK_AUTHTOKEN
        command:
        - /bin/sh
        - -c
        - |
          # Start ngrok tunnel to the API container
          ngrok http http://localhost:8000 --log=stdout --log-level=info
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /api/tunnels
            port: 4040
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/tunnels
            port: 4040
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: product-catalog-api
  namespace: cfai-project
  labels:
    app: product-catalog-api
spec:
  selector:
    app: product-catalog-api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: ngrok-web
    port: 4040
    targetPort: 4040
    protocol: TCP
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: product-catalog-api
  namespace: cfai-project
  labels:
    app: product-catalog-api
spec:
  to:
    kind: Service
    name: product-catalog-api
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: product-catalog-ngrok-web
  namespace: cfai-project
  labels:
    app: product-catalog-api
spec:
  to:
    kind: Service
    name: product-catalog-api
  port:
    targetPort: ngrok-web
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

