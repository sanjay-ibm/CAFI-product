apiVersion: v1
kind: Namespace
metadata:
  name: cafi-product
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cafi-product-api
  namespace: cafi-product
  labels:
    app: cafi-product
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cafi-product
  template:
    metadata:
      labels:
        app: cafi-product
    spec:
      containers:
      - name: api
        image: python:3.9-slim
        workingDir: /app
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install --no-cache-dir -r config/requirements.txt && \
            python app.py
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        - name: HOST
          value: "0.0.0.0"
        volumeMounts:
        - name: app-code
          mountPath: /app
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: app-code
        configMap:
          name: cafi-product-code
---
apiVersion: v1
kind: Service
metadata:
  name: cafi-product-service
  namespace: cafi-product
  labels:
    app: cafi-product
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: cafi-product
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: cafi-product-route
  namespace: cafi-product
  labels:
    app: cafi-product
spec:
  to:
    kind: Service
    name: cafi-product-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

