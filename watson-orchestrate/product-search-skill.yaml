openapi: 3.0.0
info:
  title: Product Search Skill for Watson Orchestrate
  description: |
    Watson Orchestrate skill for searching IBM product catalog using advanced fuzzy matching.
    This skill enables users to find product codes and names through natural language queries.
  version: 1.0.0
  contact:
    name: Product Catalog API Support
    url: https://product-catalog-api-cfai.apps.ocp-ai-dev.cp.fyre.ibm.com

servers:
  - url: https://product-catalog-api-cfai.apps.ocp-ai-dev.cp.fyre.ibm.com
    description: Production API Server

paths:
  /products/search:
    get:
      operationId: searchProducts
      summary: Search for IBM products
      description: |
        Search for IBM products using product codes, names, or descriptions.
        Returns matching products with confidence scores.
      x-ibm-skill:
        name: "Search IBM Products"
        description: "Find IBM product information by searching with product codes, names, or keywords"
        input:
          - name: query
            description: "Product name, code, or description to search for"
            required: true
        output:
          description: "List of matching products with scores and details"
      parameters:
        - name: query
          in: query
          required: true
          description: Search query (product code, name, or description)
          schema:
            type: string
            minLength: 1
            maxLength: 1000
          example: "IBM Cloud Pak for Data"
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: threshold
          in: query
          required: false
          description: Minimum fuzzy match score (0.0-1.0)
          schema:
            type: number
            minimum: 0.0
            maximum: 1.0
            default: 0.70
        - name: format
          in: query
          required: false
          description: Response format (new or legacy)
          schema:
            type: string
            enum: [new, legacy]
            default: new
      responses:
        '200':
          description: Successful search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                    description: Original search query
                  normalized_query:
                    type: string
                    description: Normalized version of the query
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        score:
                          type: number
                          description: Match confidence score (0.0-1.0)
                        product_code:
                          type: string
                          description: IBM product code (SLC_CODE)
                        product_name:
                          type: string
                          description: Full product name
                        matched_aliases:
                          type: array
                          items:
                            type: string
                          description: Aliases that matched the query
                        match_types:
                          type: array
                          items:
                            type: string
                          description: Types of matches found
                  execution_time_ms:
                    type: number
                    description: Query execution time in milliseconds
                  result_count:
                    type: integer
                    description: Number of results returned
              example:
                query: "Cloud Pak"
                normalized_query: "cloud_pak"
                results:
                  - score: 1.0
                    product_code: "5737-H33"
                    product_name: "IBM Cloud Pak for Data"
                    matched_aliases: ["cloud pak for data", "cp4d"]
                    match_types: ["exact_phrase"]
                execution_time_ms: 12.5
                result_count: 1
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string

  /products/{product_code}:
    get:
      operationId: getProductByCode
      summary: Get product details by code
      description: |
        Retrieve detailed information about a specific IBM product using its product code.
      x-ibm-skill:
        name: "Get Product Details"
        description: "Retrieve detailed information about an IBM product using its product code"
        input:
          - name: product_code
            description: "IBM product code (e.g., 5737-H33)"
            required: true
        output:
          description: "Product details including code and name"
      parameters:
        - name: product_code
          in: path
          required: true
          description: IBM product code (SLC_CODE)
          schema:
            type: string
          example: "5737-H33"
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                type: object
                properties:
                  product_code:
                    type: string
                    description: IBM product code
                  product_name:
                    type: string
                    description: Full product name
              example:
                product_code: "5737-H33"
                product_name: "IBM Cloud Pak for Data"
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string

  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      description: Check if the API service is running and healthy
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  matcher_type:
                    type: string
                  total_products:
                    type: integer
                  total_aliases:
                    type: integer

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication (if required)

security:
  - ApiKeyAuth: []

